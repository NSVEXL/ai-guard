<!DOCTYPE html>
<html>
<head>
  <style>
    body { width: 320px; padding: 15px; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #1e1e1e; color: white;}
    input { width: 90%; margin-bottom: 10px; padding: 8px; border-radius: 4px; border: 1px solid #444; background: #333; color: white;}
    button { width: 96%; padding: 10px; background-color: #0078D4; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold;}
    button:hover { background-color: #005A9E; }
    #result { margin-top: 15px; font-size: 13px; padding: 10px; border-radius: 4px; background-color: #2d2d2d; border-left: 4px solid #0078D4;}
  </style>
</head>
<body>
  <meta charset="UTF-8">
  <h3 style="margin-top: 0;">🌐 AI-Guard</h3>
  <input type="password" id="googleKey" placeholder="Google API Key">
  <input type="password" id="vtKey" placeholder="VirusTotal API Key">
  <button id="scanBtn">Scan Current Page</button>
  <div id="result">Ready to scan...</div>
  <script src="popup.js"></script>
</body>
</html>
